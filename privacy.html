<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Privacy Policies — NeoPrimLabs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #6db33f;
      --accent2: #4a8f2a;
      --text: #e8e4dc;
      --muted: #666;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.7;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.85);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-back {
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--accent); }

    .page-header {
      padding: 160px 40px 60px;
      border-bottom: 1px solid var(--border);
    }

    .page-label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: clamp(48px, 8vw, 100px);
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 0.95;
    }

    .page-sub {
      margin-top: 24px;
      color: var(--muted);
      font-size: 12px;
      max-width: 480px;
    }

    .apps-index {
      padding: 0 40px;
    }

    .app-policy-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 36px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: padding-left 0.3s;
      position: relative;
    }

    .app-policy-item::after {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%) scaleX(0);
      transform-origin: left;
      width: 3px;
      height: 60%;
      background: var(--accent);
      transition: transform 0.3s;
    }

    .app-policy-item:hover { padding-left: 20px; }
    .app-policy-item:hover::after { transform: translateY(-50%) scaleX(1); }

    .app-policy-name {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .app-policy-right {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .app-arrow {
      font-size: 18px;
      transition: color 0.3s, transform 0.3s;
    }

    .app-policy-item:hover .app-arrow {
      color: var(--accent);
      transform: translateX(6px);
    }

    footer {
      padding: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 40px;
    }

    .footer-logo {
      font-family: var(--font-display);
      font-size: 20px;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .footer-copy {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      nav, .page-header, .apps-index, footer { padding-left: 20px; padding-right: 20px; }
      .app-policy-right span:first-child { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">NeoPrimLabs</a>
    <a href="index.html" class="nav-back">← Back to Home</a>
  </nav>

  <div class="page-header">
    <p class="page-label">// Legal</p>
    <h1 class="page-title">Privacy<br>Policies</h1>
    <p class="page-sub">Select an app below to view its privacy policy. Each policy is written to be clear and straightforward.</p>
  </div>

  <div class="apps-index">
    <!-- Add a new <a> block here for each app you release -->

    <a href="privacy-app1.html" class="app-policy-item">
      <span class="app-policy-name">Ship Something</span>
      <div class="app-policy-right">
        <span>View Policy</span>
        <span class="app-arrow">→</span>
      </div>
    </a>

    <!-- Example of a second app entry:
    <a href="privacy-appname.html" class="app-policy-item">
      <span class="app-policy-name">Another App</span>
      <div class="app-policy-right">
        <span>View Policy</span>
        <span class="app-arrow">→</span>
      </div>
    </a>
    -->

  </div>

  <footer>
    <div class="footer-logo">NPL</div>
    <span class="footer-copy">&copy; 2026 NeoPrimLabs</span>
  </footer>

</body>
</html>
